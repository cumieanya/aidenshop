<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiden's Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root { 
            --serenity: #e9c484; /* Buttermilk */
            --custard: #e7d8c9;  /* Oat */
            --pure-light: #FFFFFF; 
            --white: #FFFFFF; 
            --dark: #c18eb2;     /* Periwinkle */
            --success: #c18eb2; 
            --candy-blue: #c18eb2; 
            --candy-yellow: #e9c484; 
        }

        @keyframes popIn {0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; }}
        @keyframes float {0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); }}
        @keyframes spin {100% { transform: rotate(360deg); }}
        @keyframes slideUp { from { bottom: -100px; opacity: 0; } to { bottom: 30px; opacity: 1; } }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Fredoka', sans-serif; 
            background-color: var(--custard); 
            background-image: radial-gradient(var(--serenity) 1px, transparent 1px); 
            background-size: 20px 20px; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--dark); 
        }

        .container { 
            background: var(--pure-light); 
            padding: 2rem; 
            border-radius: 50px; 
            box-shadow: 0px 15px 0px var(--dark), 0px 20px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
            border: 6px solid var(--white); 
            margin-bottom: 25px; 
            display: none; 
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
        }

        .active { display: block; }

        h1 { 
            text-align: center; 
            color: var(--dark); 
            font-size: 3rem; 
            margin-bottom: 20px; 
            font-weight: 700; 
            text-shadow: 4px 4px 0px var(--serenity); 
            letter-spacing: -1px; 
            animation: float 3s ease-in-out infinite; 
            white-space: nowrap; 
        }

        h2 { text-align: center; font-size: 1.8rem; margin-top: 0; color: var(--dark); }

        input, select, textarea { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 3px solid var(--serenity); 
            border-radius: 20px; 
            background: var(--white); 
            font-weight: 500; 
            font-family: inherit; 
            color: var(--dark); 
            transition: 0.3s; 
        }

        .btn-main { 
            background: var(--dark); 
            color: var(--white); 
            border: 4px solid var(--white); 
            padding: 18px; 
            border-radius: 30px; 
            font-weight: 700; 
            font-size: 1.2rem; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 15px; 
            transition: 0.3s; 
            box-shadow: 0px 6px 0px var(--serenity); 
        }

        .btn-main:hover { transform: scale(1.02) translateY(-2px); box-shadow: 0px 10px 0px var(--serenity); }
        .btn-main:active { transform: translateY(4px); box-shadow: 0px 2px 0px var(--serenity); }

        .btn-secondary { background: var(--serenity); color: var(--dark); box-shadow: 0px 6px 0px #d4b476; }

        .item-card { 
            background: var(--white); 
            border: 5px solid var(--serenity); 
            border-radius: 40px; 
            padding: 20px; 
            margin-bottom: 25px; 
            box-shadow: 10px 10px 0px var(--serenity); 
            text-align: center; 
        }

        .item-card img { 
            width: 70%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 30px; 
            border: 5px solid var(--pure-light); 
            margin: 0 auto 15px; 
            display: block; 
        }

        .order-row { 
            background: var(--white); 
            border: 3px solid var(--serenity); 
            border-radius: 25px; 
            padding: 18px; 
            margin-bottom: 15px; 
            box-shadow: 5px 5px 0px var(--serenity); 
        }

        .cart-thumbnail { 
            width: 60px; height: 60px; border: 2px solid var(--serenity); border-radius: 12px; object-fit: cover; margin-right: 12px; background: #fff; 
        }

        .magic-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(193, 142, 178, 0.6); backdrop-filter: blur(10px); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: 700; 
        }

        .spinner { 
            width: 80px; height: 80px; border: 8px solid var(--serenity); border-top: 8px solid var(--dark); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; 
        }

        .success-toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 4px solid var(--serenity); display: none; animation: slideUp 0.5s ease forwards; z-index: 10001; 
        }

        label { font-weight: 700; color: var(--dark); font-size: 0.8rem; margin-left: 5px; display: block; text-align: left; }
        #floating-cart-count { position:absolute; top:-5px; right:-5px; background:var(--serenity); color:var(--dark); font-size:10px; padding:2px 6px; border-radius:50%; border:2px solid var(--dark); }
    </style>
</head>
<body>

    <div id="loading-overlay" class="magic-overlay">
        <div class="spinner"></div>
        <h2 id="loading-text" style="color:white;">Magic in progress... ✨</h2>
    </div>

    <div id="success-toast" class="success-toast">Added! 🍭</div>

    <div id="error-modal" class="magic-overlay" style="background: rgba(193, 142, 178, 0.8);">
        <div class="container active" style="max-width: 400px; text-align: center; border: 6px solid var(--serenity);">
            <h1 style="font-size: 4rem; margin: 0;">🚫</h1>
            <h2>Notice</h2>
            <p id="error-msg" style="font-weight: 600;">Check your login! 🍬</p>
            <button class="btn-main" onclick="closeError()">OKAY 🧸</button>
        </div>
    </div>

    <!-- PAGE HOME -->
    <div id="page-home" class="container active">
        <h1>Aiden's Shop</h1>
        <h2>Premium Collections</h2>
        <button class="btn-main" onclick="showPage('page-shop')">✨ ENTER THE SHOP</button>
        <button class="btn-main btn-secondary" onclick="showPage('page-admin-login')">👑 ADMIN PANEL</button>
        <button class="btn-main" onclick="showPage('page-order-status')">📦 ORDER STATUS</button>
    </div>

    <!-- PAGE SHOP -->
    <div id="page-shop" class="container">
        <h1>Aiden's Shop ✨</h1>
        <button onclick="showPage('page-cart')" style="position:absolute; top:20px; right:25px; background:var(--dark); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">
            🛒 <span id="floating-cart-count">0</span>
        </button>
        <select id="shop-category" onchange="loadProducts()">
            <option value="All">All Categories</option>
            <option>Nail equipments</option>
            <option>Lash equipments</option>
            <option>Newborn apparel</option>
            <option>Kids apparel</option>
            <option>Woman apparel</option>
            <option>Man apparel</option>
            <option>Footwear</option>
        </select>
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <input type="text" id="shop-search" placeholder="Search...">
            <button class="btn-main" style="width:70px;" onclick="loadProducts()">🔍</button>
        </div>
        <div id="shop-items"></div>
        <button class="btn-main btn-secondary" onclick="showPage('page-home')">🔙 BACK</button>
    </div>

    <!-- PAGE CART -->
    <div id="page-cart" class="container">
        <h2>My Basket 🛒</h2>
        <div id="cart-items"></div>
        <div class="order-row" style="text-align:right; font-weight:700;">TOTAL: ₱<span id="cart-total">0.00</span></div>
        <button class="btn-main" onclick="showPage('page-checkout')">💳 CHECKOUT</button>
        <button class="btn-main btn-secondary" onclick="showPage('page-shop')">🔙 BACK</button>
    </div>

    <!-- PAGE CHECKOUT -->
    <div id="page-checkout" class="container">
        <h2>Checkout ✨</h2>
        <div id="checkout-summary"></div>
        <div class="order-row" style="text-align:right; font-weight:700; margin-bottom:15px;">TOTAL: ₱<span id="checkout-total">0.00</span></div>
        <input type="text" id="checkout-name" placeholder="Full Name">
        <input type="text" id="checkout-number" placeholder="Phone Number">
        <input type="text" id="checkout-province" placeholder="Province/City">
        <input type="text" id="checkout-municipality" placeholder="Municipality">
        <input type="text" id="checkout-barangay" placeholder="Barangay">
        <input type="text" id="checkout-zip" placeholder="ZIP Code">
        <textarea id="checkout-notes" placeholder="Notes"></textarea>
        <div style="text-align:center;">
            <p>Scan to Pay via GCASH</p>
            <img src="https://i.imgur.com/HPCXoIJ.jpeg" style="width:150px; border-radius:20px;">
        </div>
        <input type="text" id="checkout-ref" placeholder="GCASH REFERENCE NUMBER">
        <button class="btn-main" onclick="placeOrder()">✅ PLACE ORDER</button>
        <button class="btn-main btn-secondary" onclick="showPage('page-cart')">🔙 BACK</button>
    </div>

    <!-- PAGE ADMIN LOGIN -->
    <div id="page-admin-login" class="container">
        <h2>Admin Login</h2>
        <input type="email" id="admin-email" placeholder="Admin Email">
        <input type="password" id="admin-pass" placeholder="Password">
        <button class="btn-main" onclick="adminAuth()">LOGIN 👑</button>
        <button class="btn-main btn-secondary" onclick="showPage('page-home')">🔙 BACK</button>
    </div>

    <!-- PAGE ADMIN PANEL -->
    <div id="page-admin-panel" class="container">
        <h1>Dashboard 👑</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <button class="btn-main" onclick="toggleAdminView('upload')">➕ UPLOAD</button>
            <button class="btn-main" onclick="toggleAdminView('items')">📦 PRODUCTS</button>
            <button class="btn-main" onclick="toggleAdminView('orders')" style="grid-column: span 2;">📋 ORDERS</button>
        </div>
        <div id="admin-upload" style="display:none;">
            <h3 id="u-title">Add New Product</h3>
            <input type="hidden" id="edit-id">
            <select id="p-category">
                <option>Nail equipments</option>
                <option>Lash equipments</option>
                <option>Newborn apparel</option>
                <option>Kids apparel</option>
                <option>Woman apparel</option>
                <option>Man apparel</option>
                <option>Footwear</option>
            </select>
            <input type="text" id="p-img-url" placeholder="Image URL">
            <input type="text" id="p-name" placeholder="Name">
            <input type="number" id="p-price" placeholder="Price">
            <input type="number" id="p-fee" placeholder="Fee">
            <input type="text" id="p-size" placeholder="Sizes">
            <input type="text" id="p-color" placeholder="Colors">
            <button class="btn-main" id="u-btn" onclick="uploadProduct()">UPLOAD ✨</button>
            <button class="btn-main btn-secondary" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">CANCEL</button>
        </div>
        <div id="admin-inventory" style="display:none;"></div>
        <div id="admin-orders" style="display:none;"></div>
        <button class="btn-main btn-secondary" onclick="showPage('page-home')" style="margin-top:20px;">🔙 LOGOUT</button>
    </div>

    <!-- PAGE ORDER STATUS -->
    <div id="page-order-status" class="container">
        <h1>Aiden's Shop</h1>
        <h2>Order Status 📦</h2>
        <input type="text" id="status-phone" placeholder="Enter Phone Number">
        <button class="btn-main" onclick="checkOrderStatus()">🔍 CHECK STATUS</button>
        <div id="status-results"></div>
        <button class="btn-main btn-secondary" onclick="showPage('page-home')">🔙 BACK</button>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDym7sq0QNn_7sNJagdhQBMaYAADQ1ElE4", 
            authDomain: "aidenshop-a62c1.firebaseapp.com", 
            projectId: "aidenshop-a62c1", 
            storageBucket: "aidenshop-a62c1.firebasestorage.app", 
            messagingSenderId: "554971052243", 
            appId: "1:554971052243:web:5e1cd6e36cf503fa0cfc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let cart = JSON.parse(localStorage.getItem('hatice_cart')) || [];
        let globalPhotos = {};

        function startLoading(t) {
            document.getElementById('loading-text').innerText = t;
            document.getElementById('loading-overlay').style.display = 'flex';
        }
        function endLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }
        function showToast(m) {
            const t = document.getElementById('success-toast');
            t.innerText = m;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }
        function showError(m) {
            document.getElementById('error-msg').innerText = m;
            document.getElementById('error-modal').style.display = 'flex';
        }
        function closeError() {
            document.getElementById('error-modal').style.display = 'none';
        }

        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-shop') loadProducts();
            if(id === 'page-cart') updateCartUI();
            if(id === 'page-checkout') updateCheckoutSummary();
            window.scrollTo(0,0);
        }

        function loadProducts() {
            const container = document.getElementById('shop-items');
            const cat = document.getElementById('shop-category').value;
            const search = document.getElementById('shop-search').value.toLowerCase();
            container.innerHTML = "<p style='text-align:center;'>Fetching products... ✨</p>";
            let query = db.collection("products");
            if(cat !== "All") query = query.where("category", "==", cat);
            query.get().then(snap => {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    if(p.isVisible === false) return;
                    if(p.name.toLowerCase().includes(search)) {
                        globalPhotos[doc.id] = p.image;
                        const sOps = (p.size || "Standard").split(',').map(s => `<option>${s.trim()}</option>`).join('');
                        const cOps = (p.color || "Original").split(',').map(c => `<option>${c.trim()}</option>`).join('');
                        container.innerHTML += `
                            <div class="item-card"><img src="${p.image}"><h3>${p.name}</h3><p>₱${p.price.toFixed(2)} (+₱${p.fee} fee)</p>
                            <div style="text-align:left;"><label>Size:</label><select id="s-${doc.id}">${sOps}</select><label>Color:</label><select id="c-${doc.id}">${cOps}</select><label>Qty:</label><input type="number" id="q-${doc.id}" value="1" min="1"></div>
                            <button class="btn-main" onclick="addToBasketDirect('${doc.id}', '${p.name}', ${p.price}, ${p.fee}, '${p.image}')">✨ ADD TO BASKET</button>
                            </div>`;
                    }
                });
            });
        }

        function addToBasketDirect(id, name, price, fee, img) {
            const qty = parseInt(document.getElementById(`q-${id}`).value);
            cart.push({ itemId: id, name, fee: price + fee, sz: document.getElementById(`s-${id}`).value, cl: document.getElementById(`c-${id}`).value, qty, img });
            updateCartUI();
            showToast(`Added ${qty} ${name}! ✨`);
        }

        function updateCartUI() {
            const div = document.getElementById('cart-items');
            let total = 0;
            div.innerHTML = cart.length ? cart.map((i, idx) => {
                total += i.fee * i.qty;
                return `<div class="order-row" style="display:flex; align-items:center;">
                    <img src="${i.img}" class="cart-thumbnail">
                    <div style="flex-grow:1;"><b>${i.name}</b><br><small>${i.sz} | ${i.cl} (x${i.qty})</small></div>
                    <button onclick="cart.splice(${idx},1); updateCartUI();" style="border:none; background:none; color:red; cursor:pointer;">✖</button>
                </div>`;
            }).join('') : "<p style='text-align:center;'>Basket empty!</p>";
            document.getElementById('cart-total').innerText = total.toFixed(2);
            document.getElementById('floating-cart-count').innerText = cart.length;
            localStorage.setItem('hatice_cart', JSON.stringify(cart));
        }

        function updateCheckoutSummary() {
            let total = 0;
            cart.forEach(i => total += i.fee * i.qty);
            document.getElementById('checkout-total').innerText = total.toFixed(2);
            document.getElementById('checkout-summary').innerHTML = cart.map(i => `<div style="display:flex; align-items:center; margin-bottom:10px;"><img src="${i.img}" class="cart-thumbnail"><small>${i.name} x${i.qty} - ₱${(i.fee*i.qty).toFixed(2)}</small></div>`).join('');
        }

        function adminAuth() {
            startLoading("Opening Dashboard... 👑");
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then(() => {
                    endLoading();
                    showPage('page-admin-panel');
                })
                .catch((error) => {
                    endLoading();
                    showError(error.message);
                });
        }

        function placeOrder() {
            const ref = document.getElementById('checkout-ref').value.trim();
            if(!ref) return alert("Enter Reference Number!");
            startLoading("Placing order... 📦");
            const orderData = {
                name: document.getElementById('checkout-name').value,
                number: document.getElementById('checkout-number').value,
                province: document.getElementById('checkout-province').value,
                municipality: document.getElementById('checkout-municipality').value,
                barangay: document.getElementById('checkout-barangay').value,
                zip: document.getElementById('checkout-zip').value,
                notes: document.getElementById('checkout-notes').value,
                total: document.getElementById('checkout-total').innerText,
                refNumber: ref,
                items: cart,
                status: "Pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                hiddenByAdmin: false,
                hiddenByCustomer: false
            };
            db.collection("orders").add(orderData).then(() => {
                cart = [];
                updateCartUI();
                setTimeout(() => {
                    endLoading();
                    alert("Order Placed Successfully! ✨");
                    showPage('page-home');
                }, 1500);
            });
        }

        function toggleAdminView(v) {
            document.getElementById('admin-upload').style.display = (v === 'upload' ? 'block' : 'none');
            document.getElementById('admin-inventory').style.display = (v === 'items' ? 'block' : 'none');
            document.getElementById('admin-orders').style.display = (v === 'orders' ? 'block' : 'none');
            if(v === 'items') loadAdminInventory();
            if(v === 'orders') loadAdminOrders();
        }

        function loadAdminInventory() {
            const div = document.getElementById('admin-inventory');
            db.collection("products").orderBy("timestamp", "desc").get().then(snap => {
                div.innerHTML = "<h3>Inventory</h3>" + snap.docs.map(doc => {
                    const p = doc.data();
                    return `<div class="order-row" style="display:flex; align-items:center;">
                        <img src="${p.image}" class="cart-thumbnail">
                        <div style="flex-grow:1;"><b>${p.name}</b> ${p.isVisible===false?'(HIDDEN)':''}<br>₱${p.price}</div>
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <button class="btn-main" onclick="editProduct('${doc.id}')" style="padding:5px; font-size:0.7rem; margin:0;">EDIT</button>
                            <button onclick="toggleVisibility('${doc.id}', ${p.isVisible!==false})" style="border:none; background:none; font-size:0.7rem; cursor:pointer;">${p.isVisible===false?'SHOW':'HIDE'}</button>
                            <button onclick="deleteProduct('${doc.id}')" style="color:red; background:none; border:none; font-size:0.7rem; cursor:pointer;">DEL</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        function toggleVisibility(id, cur) {
            db.collection("products").doc(id).update({ isVisible: !cur }).then(() => loadAdminInventory());
        }

        function deleteProduct(id) {
            if(confirm("Delete product?")) db.collection('products').doc(id).delete().then(()=>loadAdminInventory());
        }

        function editProduct(id) {
            db.collection("products").doc(id).get().then(doc => {
                const p = doc.data();
                document.getElementById('edit-id').value = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-fee').value = p.fee;
                document.getElementById('p-img-url').value = p.image;
                document.getElementById('p-size').value = p.size;
                document.getElementById('p-color').value = p.color;
                document.getElementById('p-category').value = p.category;
                document.getElementById('u-title').innerText = "Editing: " + p.name;
                document.getElementById('u-btn').innerText = "SAVE CHANGES";
                document.getElementById('cancel-edit-btn').style.display = "block";
                toggleAdminView('upload');
                window.scrollTo(0,0);
            });
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = "";
            document.getElementById('u-title').innerText = "Add New Product";
            document.getElementById('u-btn').innerText = "UPLOAD ✨";
            document.getElementById('cancel-edit-btn').style.display = "none";
            toggleAdminView('items');
        }

        function uploadProduct() {
            startLoading("Saving... ✨");
            const eid = document.getElementById('edit-id').value;
            const data = {
                category: document.getElementById('p-category').value,
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                fee: parseFloat(document.getElementById('p-fee').value) || 0,
                size: document.getElementById('p-size').value,
                color: document.getElementById('p-color').value,
                image: document.getElementById('p-img-url').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            const task = eid ? db.collection("products").doc(eid).update(data) : db.collection("products").add({ ...data, isVisible: true });
            task.then(() => {
                endLoading();
                showToast("Success! ✨");
                cancelEdit();
            }).catch(() => {
                endLoading();
                showError("Unauthorized! 🚫");
            });
        }

        function loadAdminOrders() {
            const div = document.getElementById('admin-orders');
            db.collection("orders").orderBy("timestamp", "desc").get().then(snap => {
                div.innerHTML = "<h3>All Orders</h3>" + snap.docs.map(doc => {
                    const o = doc.data();
                    if(o.hiddenByAdmin) return '';
                    const itemsHTML = o.items.map(i => `<div style="display:flex; align-items:center; margin-top:5px; border-top:1px solid #eee;"><img src="${i.img}" class="cart-thumbnail" style="width:30px; height:30px;"><small>${i.name} (${i.sz}/${i.cl}) x${i.qty}</small></div>`).join('');
                    let approvalSection = "";
                    if(o.status !== "Done") {
                        approvalSection = `
                            <div style="margin-top:10px; border-top:2px dashed var(--serenity); padding-top:10px;">
                                <label>Mandatory Note:</label><input type="text" id="note-${doc.id}" placeholder="Note for customer">
                                <label>Mandatory Image URL:</label><input type="text" id="aimg-${doc.id}" placeholder="Proof URL">
                                <button onclick="approveOrder('${doc.id}')" class="btn-main" style="padding:10px; font-size:0.8rem;">COMPLETE ✨</button>
                            </div>`;
                    } else {
                        approvalSection = `
                            <div style="margin-top:10px; padding:10px; background:#f0f0f0; border-radius:15px; text-align:center;">
                                <b style="color:green;">✅ COMPLETED</b><br>
                                <button onclick="adminCleanHistory('${doc.id}')" style="background:none; border:none; color:red; cursor:pointer; font-size:0.7rem; margin-top:5px;">ARCHIVE</button>
                            </div>`;
                    }
                    return `<div class="order-row" style="font-size:0.8rem;">
                        <b>CUSTOMER INFO:</b><br>${o.name} (${o.number})<br>Ref: ${o.refNumber}<br>
                        <b>ADDRESS:</b><br>${o.province}, ${o.municipality}, ${o.barangay} (${o.zip})<br>
                        <b>Total:</b> ₱${o.total} | <b>Status:</b> ${o.status}<br>
                        ${itemsHTML} ${approvalSection}
                        </div>`;
                }).join('');
            });
        }

        function approveOrder(id) {
            const n = document.getElementById(`note-${id}`).value.trim();
            const i = document.getElementById(`aimg-${id}`).value.trim();
            if(!n || !i) return alert("Note and Image URL are MANDATORY!");
            startLoading("Approving... ✨");
            db.collection("orders").doc(id).update({ status: "Done", adminNote: n, adminImage: i }).then(() => {
                endLoading();
                showToast("Approved! ✨");
                loadAdminOrders();
            });
        }

        function adminCleanHistory(id) {
            if(confirm("Archive this order?")) {
                db.collection("orders").doc(id).update({ hiddenByAdmin: true }).then(() => loadAdminOrders());
            }
        }

        function checkOrderStatus() {
            const phone = document.getElementById('status-phone').value.trim();
            if(!phone) return alert("Enter phone number!");
            startLoading("Searching... 🔍");
            db.collection("orders").where("number", "==", phone).get().then(snap => {
                endLoading();
                document.getElementById('status-results').innerHTML = snap.docs.map(doc => {
                    const o = doc.data();
                    if(o.hiddenByCustomer) return '';
                    const itemsHTML = o.items.map(i => `<div style="display:flex; align-items:center; margin-top:5px;"><img src="${i.img}" class="cart-thumbnail" style="width:35px; height:35px;"><small>${i.name} (x${i.qty})</small></div>`).join('');
                    let adminSection = "";
                    if(o.status === "Done") {
                        adminSection = `
                            <div style="margin-top:10px; background:var(--custard); padding:10px; border-radius:20px; border:2px solid var(--dark);">
                                <p><b>Note:</b> ${o.adminNote}</p>
                                <img src="${o.adminImage}" style="width:100%; border-radius:15px;">
                                <button onclick="customerCleanHistory('${doc.id}')" style="background:#c18eb2; color:white; border:none; padding:10px; border-radius:15px; cursor:pointer; width:100%; font-weight:700; margin-top:10px;">DELETE HISTORY 🗑️</button>
                            </div>`;
                    }
                    return `<div class="order-row">Status: <b>${o.status}</b><br>Ref: ${o.refNumber}<br>${itemsHTML}${adminSection}</div>`;
                }).join('') || "No orders found.";
            });
        }

        function customerCleanHistory(id) {
            if(confirm("Remove from history?")) {
                db.collection("orders").doc(id).update({ hiddenByCustomer: true }).then(() => checkOrderStatus());
            }
        }

        document.addEventListener('DOMContentLoaded', () => updateCartUI());
    </script>
</body>
</html>
